<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Compressor Pro v2.2</title>
    
    <script>
        window.coi = {
            shouldRegister: () => true,
            shouldDeregister: () => false,
            coepCredentialless: () => true,
            coepDegrade: () => true,
            doReload: () => window.location.reload(),
            quiet: false
        };
    </script>

    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root { --primary: #00cf81; --bg: #0f0f0f; --card: #1a1a1a; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: white; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .container { 
            background: var(--card); width: 100%; max-width: 500px; 
            padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h2 { margin: 0; color: var(--primary); text-align: center; }
        p.subtitle { color: #888; text-align: center; font-size: 12px; margin-bottom: 20px; }
        .control-group { 
            margin-bottom: 20px; border: 2px dashed #333; 
            padding: 20px; border-radius: 10px; text-align: center; 
        }
        button { 
            background: var(--primary); color: black; border: none; 
            padding: 15px; border-radius: 10px; font-weight: bold; 
            cursor: pointer; width: 100%; font-size: 16px; 
        }
        button:disabled { background: #444; color: #888; }
        .progress-section { margin: 20px 0; display: none; }
        .progress-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }
        .log-container { 
            background: #000; border-radius: 8px; padding: 12px; 
            height: 180px; overflow-y: auto; font-family: monospace; 
            font-size: 11px; border: 1px solid #333; margin-top: 15px;
        }
        #download-area { margin-top: 20px; text-align: center; }
        .download-btn { 
            display: block; background: white; color: black; 
            text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Compressor v2.2</h2>
    <p class="subtitle">Mode: SharedArrayBuffer + Ultrafast</p>
    
    <div class="control-group">
        <input type="file" id="uploader" accept="video/*">
    </div>

    <button id="btn-start">Mulai Kompresi</button>

    <div class="progress-section" id="prog-section">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
            <span id="status-text">Menunggu...</span>
            <span id="percent-text">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="log-container" id="log-box"></div>
    <div id="download-area"></div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const logBox = document.getElementById('log-box');
    
    function appendLog(msg) {
        const div = document.createElement('div');
        div.style.color = "#aaa";
        div.innerText = `> ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    const ffmpeg = createFFmpeg({ 
        log: true,
        logger: ({ message }) => appendLog(message)
    });

    const btn = document.getElementById('btn-start');
    const uploader = document.getElementById('uploader');
    const progFill = document.getElementById('progress-fill');
    const percentText = document.getElementById('percent-text');
    const statusText = document.getElementById('status-text');

    btn.addEventListener('click', async () => {
        const file = uploader.files[0];
        if (!file) return alert("Pilih file video!");

        btn.disabled = true;
        document.getElementById('prog-section').style.display = 'block';
        
        try {
            if (!ffmpeg.isLoaded()) {
                appendLog("Loading FFmpeg Core...");
                await ffmpeg.load();
            }

            appendLog("Membaca file...");
            ffmpeg.FS('writeFile', 'input', await fetchFile(file));

            ffmpeg.setProgress(({ ratio }) => {
                const p = Math.round(ratio * 100);
                progFill.style.width = p + '%';
                percentText.innerText = p + '%';
                statusText.innerText = "Mengompres...";
            });

            // Perintah paling ringan untuk browser mobile
            await ffmpeg.run(
                '-i', 'input', 
                '-vcodec', 'libx264', 
                '-preset', 'ultrafast', 
                '-crf', '30',
                '-acodec', 'aac',
                'output.mp4'
            );

            statusText.innerText = "Selesai!";
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            document.getElementById('download-area').innerHTML = `
                <a href="${url}" download="hasil_kompres.mp4" class="download-btn">DOWNLOAD HASIL</a>
            `;
        } catch (e) {
            appendLog("ERROR: " + e.message);
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
