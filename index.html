<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Compressor Pro - Debug Mode</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --primary: #00cf81; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { background: var(--card); width: 100%; max-width: 600px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: var(--primary); text-align: center; }

        .control-group { margin: 20px 0; border: 1px dashed #444; padding: 15px; border-radius: 8px; text-align: center; }
        
        button { background: var(--primary); color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,207,129,0.4); }

        /* Progress Styling */
        .progress-section { margin: 20px 0; display: none; }
        .progress-text { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }

        /* Log Styling */
        .log-container { background: #000; border-radius: 8px; padding: 15px; height: 200px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 12px; border: 1px solid #333; margin-top: 20px; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #444; padding-left: 8px; }
        .log-info { color: #00cf81; }
        .log-error { color: #ff4d4d; }

        #download-area { margin-top: 20px; text-align: center; }
        .download-btn { display: inline-block; background: #fff; color: #000; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Compressor v2</h2>
    
    <div class="control-group">
        <input type="file" id="uploader" accept="video/*">
    </div>

    <button id="btn-start">Mulai Kompresi</button>

    <div class="progress-section" id="prog-section">
        <div class="progress-text">
            <span id="status-text">Memproses...</span>
            <span id="percent-text">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="download-area"></div>

    <div class="log-container" id="log-box">
        <div class="log-entry" style="color: #888;">> Console log siap. Menunggu file...</div>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // Inisialisasi FFmpeg dengan Logger
    const ffmpeg = createFFmpeg({ 
        log: true,
        logger: ({ message }) => {
            appendLog(message);
        }
    });

    const btn = document.getElementById('btn-start');
    const uploader = document.getElementById('uploader');
    const logBox = document.getElementById('log-box');
    const progSection = document.getElementById('prog-section');
    const progFill = document.getElementById('progress-fill');
    const percentText = document.getElementById('percent-text');
    const statusText = document.getElementById('status-text');
    const downloadArea = document.getElementById('download-area');

    function appendLog(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        if (msg.includes('Error')) div.classList.add('log-error');
        if (msg.includes('frame=')) div.classList.add('log-info'); // Info encoding
        div.innerText = `> ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    btn.addEventListener('click', async () => {
        const file = uploader.files[0];
        if (!file) return alert("Pilih video terlebih dahulu!");

        btn.disabled = true;
        progSection.style.display = 'block';
        downloadArea.innerHTML = '';
        
        try {
            if (!ffmpeg.isLoaded()) {
                statusText.innerText = "Memuat core engine...";
                await ffmpeg.load();
            }

            statusText.innerText = "Membaca file...";
            ffmpeg.FS('writeFile', 'input_file', await fetchFile(file));

            // Progres Handler
            ffmpeg.setProgress(({ ratio }) => {
                const percentage = Math.round(ratio * 100);
                progFill.style.width = percentage + '%';
                percentText.innerText = percentage + '%';
                statusText.innerText = "Mengompres video...";
            });

            // Eksekusi FFmpeg
            // Menggunakan preset 'veryfast' agar tidak terlalu lama di browser
            await ffmpeg.run(
                '-i', 'input_file', 
                '-vcodec', 'libx264', 
                '-crf', '28', 
                '-preset', 'veryfast', 
                '-acodec', 'aac', 
                'output.mp4'
            );

            statusText.innerText = "Selesai!";
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));

            downloadArea.innerHTML = `
                <a href="${url}" download="compressed_${file.name}" class="download-btn">
                    ⬇️ Download Hasil Kompresi
                </a>
            `;

        } catch (err) {
            appendLog("ERROR: " + err.message);
            statusText.innerText = "Terjadi kesalahan!";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
